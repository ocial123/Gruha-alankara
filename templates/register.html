{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 2rem auto; text-align: center;">
    <h2 style="color: var(--accent-color);">Register</h2>
    <form action="{{ url_for('register') }}" method="POST"
        style="display: flex; flex-direction: column; gap: 1rem; margin-top: 1rem;">
        <input type="text" name="username" placeholder="Username" required
            style="padding: 0.5rem; border-radius: 4px; border: 1px solid var(--text-secondary); background: var(--bg-primary); color: var(--text-primary);">
        <input type="email" name="email" placeholder="Email Address" required
            style="padding: 0.5rem; border-radius: 4px; border: 1px solid var(--text-secondary); background: var(--bg-primary); color: var(--text-primary);">
        <input type="password" name="password" placeholder="Password" required
            style="padding: 0.5rem; border-radius: 4px; border: 1px solid var(--text-secondary); background: var(--bg-primary); color: var(--text-primary);">
        <button type="submit" class="btn">Create Account</button>
    </form>
    <p style="margin-top: 1rem; color: var(--text-secondary);">Already have an account? <a href="{{ url_for('login') }}"
            style="color: var(--accent-color);">Login here</a></p>
</div>
{% endblock %}
